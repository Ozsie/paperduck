spring.application.name=paperduck
server.tomcat.connection-timeout=120000
spring.mvc.async.request-timeout=120000

spring.ai.openai.api-key="not-needed"
spring.ai.openai.base-url=http://localhost:1234/v1
spring.ai.openai.chat.model=qwen3.6-35b-a3b-uncensored-hauhaucs-aggressive
spring.ai.openai.chat.temperature=0.2

spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.model=mistral-small-latest
spring.ai.mistralai.chat.temperature=0.2

paperduck.ai.service=mistral

# Knowledge repositories
paperduck.repositories[0].id=anutu
paperduck.repositories[0].name=Anutu
paperduck.repositories[0].repo-url=https://api.github.com/repos/Ozsie/anutu
paperduck.repositories[0].raw-url=https://raw.githubusercontent.com/Ozsie/anutu/main

paperduck.repositories[1].id=grannen
paperduck.repositories[1].name=Grannen
paperduck.repositories[1].repo-url=https://api.github.com/repos/Ozsie/grannen
paperduck.repositories[1].raw-url=https://raw.githubusercontent.com/Ozsie/grannen/main

logging.level.org.springframework.ai=INFO
logging.level.org.springframework.web.client.RestTemplate=INFO
logging.level.org.apache.hc.client5.http=INFO
logging.level.io.micrometer=INFO
# Authentication
spring.security.user.name=${PAPERDUCK_USERNAME}
# password should be stored in environment variables
spring.security.user.password=${PAPERDUCK_PASSWORD}
