<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperduck Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
        #history { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background-color: #e3f2fd; align-self: flex-end; }
        .ai { background-color: #f5f5f5; }
        .message pre { background-color: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .message code { font-family: monospace; background-color: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; }
        .message p { margin: 5px 0; }
        .message ul, .message ol { margin-left: 20px; }
        #controls { display: flex; flex-direction: column; gap: 10px; }
        #input-area { display: flex; gap: 10px; }
        #question { flex-grow: 1; padding: 8px; }
        #tags-area { position: relative; display: inline-block; width: 100%; }
        #tags-dropdown-btn { 
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; 
            background: white; display: flex; gap: 5px; min-height: 20px; align-items: center;
        }
        #selected-tags-container {
            display: flex; flex-wrap: wrap; gap: 5px; flex-grow: 1;
        }
        #tags-dropdown-btn:after { content: '▼'; margin-left: auto; font-size: 0.8em; color: #777; }
        #tags-menu { 
            display: none; position: absolute; top: 100%; left: 0; right: 0; 
            border: 1px solid #ccc; background: white; z-index: 10; max-height: 200px; overflow-y: auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #tags-menu.show { display: block; }
        #tag-search { width: 100%; box-sizing: border-box; padding: 8px; border: none; border-bottom: 1px solid #eee; outline: none; }
        .tag-item { padding: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tag-item:hover { background-color: #f5f5f5; }
        .tag-item input { pointer-events: none; }
        .selected-tag-badge { 
            background-color: #2196f3; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; 
            display: flex; align-items: center; gap: 4px;
        }
        .selected-tag-badge .remove-tag { cursor: pointer; font-weight: bold; }
        #add-tag-area { display: flex; gap: 10px; margin-top: 5px; }
        #new-tag { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #add-tag-btn { padding: 8px 16px; background-color: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #add-tag-btn:hover { background-color: #45a049; }
        .loading { font-style: italic; color: #666; }
        .tool-calls, .tags-used { font-size: 0.8em; color: #777; margin-top: 4px; }
        
        /* Popup Styles */
        #popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #popup-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Paperduck Chat</h1>
    
    <div id="history">
        <div class="message ai">Welcome! Select tags and ask me anything about your stories.</div>
    </div>

    <div id="controls">
        <div id="tags-area">
            <div id="tags-dropdown-btn">
                <span id="selected-tags-container">Select tags...</span>
            </div>
            <div id="tags-menu">
                <input type="text" id="tag-search" placeholder="Search tags..." autocomplete="off">
                <div id="tags-list"></div>
            </div>
        </div>
        <div id="add-tag-area">
            <input type="text" id="new-tag" placeholder="New tag..." autocomplete="off">
            <button id="add-tag-btn">Add Tag</button>
        </div>
        <div id="input-area">
            <input type="text" id="question" placeholder="Ask a question..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="popup-overlay">
        <div id="popup-content">
            <span id="popup-close">&times;</span>
            <div id="popup-body"></div>
        </div>
    </div>

    <script>
        const historyDiv = document.getElementById('history');
        const tagsArea = document.getElementById('tags-area');
        const tagsDropdownBtn = document.getElementById('tags-dropdown-btn');
        const tagsMenu = document.getElementById('tags-menu');
        const tagsList = document.getElementById('tags-list');
        const tagSearch = document.getElementById('tag-search');
        const selectedTagsContainer = document.getElementById('selected-tags-container');
        const questionInput = document.getElementById('question');
        const sendBtn = document.getElementById('send-btn');
        const newTagInput = document.getElementById('new-tag');
        const addTagBtn = document.getElementById('add-tag-btn');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupBody = document.getElementById('popup-body');
        const popupClose = document.getElementById('popup-close');

        let allTags = [];
        let selectedTags = new Set();

        // Fetch and display tags
        async function loadTags() {
            try {
                const response = await fetch('/tags');
                allTags = await response.json();
                renderTags();
                renderSelectedTags();
            } catch (error) {
                console.error('Error loading tags:', error);
                tagsList.innerHTML = '<div class="tag-item">Error loading tags.</div>';
            }
        }

        function renderTags() {
            const filter = tagSearch.value.toLowerCase();
            tagsList.innerHTML = '';
            
            const filteredTags = allTags.filter(tag => tag.toLowerCase().includes(filter));
            
            if (filteredTags.length === 0) {
                tagsList.innerHTML = '<div class="tag-item">No tags found.</div>';
                return;
            }

            filteredTags.forEach(tag => {
                const item = document.createElement('div');
                item.className = 'tag-item';
                const isChecked = selectedTags.has(tag);
                item.innerHTML = `
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <span>${tag}</span>
                `;
                item.onclick = (e) => {
                    e.stopPropagation();
                    toggleTag(tag);
                };
                tagsList.appendChild(item);
            });
        }

        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            renderTags();
            renderSelectedTags();
        }

        function renderSelectedTags() {
            if (selectedTags.size === 0) {
                selectedTagsContainer.innerHTML = 'Select tags...';
                return;
            }
            
            selectedTagsContainer.innerHTML = '';
            selectedTags.forEach(tag => {
                const badge = document.createElement('span');
                badge.className = 'selected-tag-badge';
                badge.innerHTML = `
                    ${tag}
                    <span class="remove-tag">&times;</span>
                `;
                badge.querySelector('.remove-tag').onclick = (e) => {
                    e.stopPropagation();
                    toggleTag(tag);
                };
                selectedTagsContainer.appendChild(badge);
            });
        }

        tagsDropdownBtn.onclick = (e) => {
            tagsMenu.classList.toggle('show');
            if (tagsMenu.classList.contains('show')) {
                tagSearch.focus();
            }
            e.stopPropagation();
        };

        tagSearch.oninput = () => renderTags();
        tagSearch.onclick = (e) => e.stopPropagation();

        window.onclick = () => {
            tagsMenu.classList.remove('show');
        };

        function appendMessage(role, text, toolCalls = [], tagsUsed = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const content = document.createElement('div');
            content.innerHTML = marked.parse(text);
            msgDiv.appendChild(content);

            if (tagsUsed && tagsUsed.length > 0) {
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'tags-used';
                tagsDiv.textContent = `Tags used: ${tagsUsed.join(', ')}`;
                msgDiv.appendChild(tagsDiv);
            }

            if (toolCalls && toolCalls.length > 0) {
                const toolsDiv = document.createElement('div');
                toolsDiv.className = 'tool-calls';
                const toolsUsed = [...new Set(toolCalls.map(tc => tc.tool))];
                toolsDiv.textContent = `Tools used: ${toolsUsed.join(', ')}`;
                msgDiv.appendChild(toolsDiv);
            }

            historyDiv.appendChild(msgDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;
            return msgDiv;
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            const tagsArray = Array.from(selectedTags);

            if (!question && tagsArray.length === 0) return;

            appendMessage('user', question || '(No question, tags selected)');
            questionInput.value = '';
            
            const loadingMsg = appendMessage('ai', 'Thinking...');
            loadingMsg.classList.add('loading');

            try {
                const params = new URLSearchParams({
                    question: question,
                    tags: tagsArray.join(',')
                });
                const response = await fetch(`/ask?${params.toString()}`);
                const result = await response.json();
                
                loadingMsg.remove();
                appendMessage('ai', result.answer, result.toolCalls, result.tagsUsed);
            } catch (error) {
                console.error('Error:', error);
                loadingMsg.textContent = 'Error: Could not get a response.';
                loadingMsg.classList.remove('loading');
            }
        }

        async function addTag() {
            const tag = newTagInput.value.trim();
            if (!tag) return;

            try {
                const response = await fetch(`/tags/${encodeURIComponent(tag)}`, {
                    method: 'PUT'
                });
                if (response.ok) {
                    newTagInput.value = '';
                    await loadTags();
                } else {
                    console.error('Failed to add tag');
                }
            } catch (error) {
                console.error('Error adding tag:', error);
            }
        }

        // Popup logic
        async function showKnowledgePopup(url) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const html = await response.text();
                    popupBody.innerHTML = html;
                    popupOverlay.style.display = 'flex';
                } else {
                    console.error('Failed to fetch knowledge');
                }
            } catch (error) {
                console.error('Error fetching knowledge:', error);
            }
        }

        function closePopup() {
            popupOverlay.style.display = 'none';
            popupBody.innerHTML = '';
        }

        popupClose.addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) closePopup();
        });

        // Intercept link clicks
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link && link.getAttribute('href')) {
                let href = link.getAttribute('href');
                
                // If it's a relative link within a knowledge file, it might not start with /knowledge/
                // but should still be treated as one if it refers to another markdown file
                if (!href.startsWith('http') && !href.startsWith('/') && href.endsWith('.md')) {
                    href = '/knowledge/' + href;
                }

                if (href.startsWith('/knowledge/')) {
                    e.preventDefault();
                    showKnowledgePopup(href);
                }
            }
        });

        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });

        addTagBtn.addEventListener('click', addTag);
        newTagInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTag();
        });

        loadTags();
    </script>
</body>
</html>
