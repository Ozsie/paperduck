<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperduck Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
        #history { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background-color: #e3f2fd; align-self: flex-end; }
        .ai { background-color: #f5f5f5; }
        .message pre { background-color: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .message code { font-family: monospace; background-color: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; }
        .message p { margin: 5px 0; }
        .message ul, .message ol { margin-left: 20px; }
        #controls { display: flex; flex-direction: column; gap: 10px; }
        #input-area { display: flex; gap: 10px; }
        #question { flex-grow: 1; padding: 8px; }
        #tags-area { display: flex; flex-wrap: wrap; gap: 5px; border: 1px solid #eee; padding: 5px; }
        .tag-checkbox { display: none; }
        .tag-label { padding: 4px 8px; border: 1px solid #ccc; border-radius: 15px; cursor: pointer; font-size: 0.9em; }
        .tag-checkbox:checked + .tag-label { background-color: #2196f3; color: white; border-color: #2196f3; }
        .loading { font-style: italic; color: #666; }
        .tool-calls, .tags-used { font-size: 0.8em; color: #777; margin-top: 4px; }
        
        /* Popup Styles */
        #popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #popup-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Paperduck Chat</h1>
    
    <div id="history">
        <div class="message ai">Welcome! Select tags and ask me anything about your stories.</div>
    </div>

    <div id="controls">
        <div id="tags-area">
            <span>Loading tags...</span>
        </div>
        <div id="add-tag-area">
            <input type="text" id="new-tag" placeholder="New tag..." autocomplete="off">
            <button id="add-tag-btn">Add Tag</button>
        </div>
        <div id="input-area">
            <input type="text" id="question" placeholder="Ask a question..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="popup-overlay">
        <div id="popup-content">
            <span id="popup-close">&times;</span>
            <div id="popup-body"></div>
        </div>
    </div>

    <script>
        const historyDiv = document.getElementById('history');
        const tagsArea = document.getElementById('tags-area');
        const questionInput = document.getElementById('question');
        const sendBtn = document.getElementById('send-btn');
        const newTagInput = document.getElementById('new-tag');
        const addTagBtn = document.getElementById('add-tag-btn');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupBody = document.getElementById('popup-body');
        const popupClose = document.getElementById('popup-close');

        // Fetch and display tags
        async function loadTags() {
            try {
                const response = await fetch('/tags');
                const tags = await response.json();
                tagsArea.innerHTML = '<strong>Tags:</strong> ';
                tags.forEach(tag => {
                    const id = `tag-${tag}`;
                    const container = document.createElement('span');
                    container.innerHTML = `
                        <input type="checkbox" class="tag-checkbox" id="${id}" value="${tag}">
                        <label class="tag-label" for="${id}">${tag}</label>
                    `;
                    tagsArea.appendChild(container);
                });
            } catch (error) {
                console.error('Error loading tags:', error);
                tagsArea.innerHTML = 'Error loading tags.';
            }
        }

        function appendMessage(role, text, toolCalls = [], tagsUsed = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const content = document.createElement('div');
            content.innerHTML = marked.parse(text);
            msgDiv.appendChild(content);

            if (tagsUsed && tagsUsed.length > 0) {
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'tags-used';
                tagsDiv.textContent = `Tags used: ${tagsUsed.join(', ')}`;
                msgDiv.appendChild(tagsDiv);
            }

            if (toolCalls && toolCalls.length > 0) {
                const toolsDiv = document.createElement('div');
                toolsDiv.className = 'tool-calls';
                const toolsUsed = [...new Set(toolCalls.map(tc => tc.tool))];
                toolsDiv.textContent = `Tools used: ${toolsUsed.join(', ')}`;
                msgDiv.appendChild(toolsDiv);
            }

            historyDiv.appendChild(msgDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;
            return msgDiv;
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            const selectedTags = Array.from(document.querySelectorAll('.tag-checkbox:checked'))
                .map(cb => cb.value);

            if (!question && selectedTags.length === 0) return;

            appendMessage('user', question || '(No question, tags selected)');
            questionInput.value = '';
            
            const loadingMsg = appendMessage('ai', 'Thinking...');
            loadingMsg.classList.add('loading');

            try {
                const params = new URLSearchParams({
                    question: question,
                    tags: selectedTags.join(',')
                });
                const response = await fetch(`/ask?${params.toString()}`);
                const result = await response.json();
                
                loadingMsg.remove();
                appendMessage('ai', result.answer, result.toolCalls, result.tagsUsed);
            } catch (error) {
                console.error('Error:', error);
                loadingMsg.textContent = 'Error: Could not get a response.';
                loadingMsg.classList.remove('loading');
            }
        }

        async function addTag() {
            const tag = newTagInput.value.trim();
            if (!tag) return;

            try {
                const response = await fetch(`/tags/${encodeURIComponent(tag)}`, {
                    method: 'PUT'
                });
                if (response.ok) {
                    newTagInput.value = '';
                    await loadTags();
                } else {
                    console.error('Failed to add tag');
                }
            } catch (error) {
                console.error('Error adding tag:', error);
            }
        }

        // Popup logic
        async function showKnowledgePopup(url) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const html = await response.text();
                    popupBody.innerHTML = html;
                    popupOverlay.style.display = 'flex';
                } else {
                    console.error('Failed to fetch knowledge');
                }
            } catch (error) {
                console.error('Error fetching knowledge:', error);
            }
        }

        function closePopup() {
            popupOverlay.style.display = 'none';
            popupBody.innerHTML = '';
        }

        popupClose.addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) closePopup();
        });

        // Intercept link clicks
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link && link.getAttribute('href')) {
                let href = link.getAttribute('href');
                
                // If it's a relative link within a knowledge file, it might not start with /knowledge/
                // but should still be treated as one if it refers to another markdown file
                if (!href.startsWith('http') && !href.startsWith('/') && href.endsWith('.md')) {
                    href = '/knowledge/' + href;
                }

                if (href.startsWith('/knowledge/')) {
                    e.preventDefault();
                    showKnowledgePopup(href);
                }
            }
        });

        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });

        addTagBtn.addEventListener('click', addTag);
        newTagInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTag();
        });

        loadTags();
    </script>
</body>
</html>
